<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Input Data Jamaah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    padding:12px;
}

.container{
    width:100%;
    max-width:1000px;
    margin:auto;
    background:#ffffff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,0.25);
}

.header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:24px 20px;
    text-align:center;
}

.header h1{
    font-size:22px;
    font-weight:700;
    line-height:1.4;
}

.form-area{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/-1;
}

label{
    margin-bottom:8px;
    font-size:13px;
    font-weight:600;
    color:#334155;
}

input,
select,
textarea{
    width:100%;
    padding:14px 15px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
    outline:none;
    transition:0.3s;
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,0.10);
}

textarea{
    resize:none;
    min-height:90px;
}

input[type="file"]{
    padding:12px;
    background:#f1f5f9;
    cursor:pointer;
}

.file-info{
    font-size:11px;
    color:#64748b;
    margin-top:6px;
    word-break:break-word;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:25px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(0.98);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

#status{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    font-weight:600;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .container{
        border-radius:18px;
    }

    .header{
        padding:22px 16px;
    }

    .header h1{
        font-size:19px;
    }

    .form-area{
        padding:16px;
    }

    .grid{
        grid-template-columns:1fr;
        gap:15px;
    }

    label{
        font-size:12px;
    }

    input,
    select,
    textarea{
        font-size:14px;
        padding:13px;
        border-radius:12px;
    }

    button{
        padding:15px;
        font-size:14px;
        border-radius:14px;
    }

}

@media(max-width:480px){

    body{
        padding:8px;
    }

    .header h1{
        font-size:17px;
    }

    .form-area{
        padding:14px;
    }

    input,
    select,
    textarea{
        font-size:13px;
    }

    .file-info{
        font-size:10px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Input Data Jamaah</h1>
</div>

<div class="form-area">

<form id="jamaahForm">

<div class="grid">

<div class="form-group">
<label>Upload Foto</label>
<input type="file" id="foto" accept="image/*">
<div class="file-info" id="fotoInfo"></div>
</div>

<div class="form-group">
<label>Nama Lengkap</label>
<input type="text" id="nama" required placeholder="Masukkan nama lengkap">
</div>

<div class="form-group">
<label>Status SISKOPATUH</label>
<select id="statusSiskopatuh">
<option>Aktif</option>
<option>Belum Aktif</option>
</select>
</div>

<div class="form-group">
<label>ID Jamaah</label>
<input type="text" id="idJamaah" placeholder="Masukkan ID Jamaah">
</div>

<div class="form-group">
<label>No Paspor</label>
<input type="text" id="paspor" placeholder="Masukkan nomor paspor">
</div>

<div class="form-group">
<label>Masa Berlaku Paspor</label>
<input type="date" id="masaPaspor">
</div>

<div class="form-group">
<label>Status Paspor</label>
<select id="statusPaspor">
<option>Aktif</option>
<option>Kadaluarsa</option>
</select>
</div>

<div class="form-group">
<label>NIK</label>
<input type="text" id="nik" placeholder="Masukkan NIK">
</div>

<div class="form-group full">
<label>Riwayat Penyakit</label>
<textarea id="penyakit" placeholder="Masukkan riwayat penyakit"></textarea>
</div>

<div class="form-group">
<label>No WhatsApp</label>
<input type="text" id="wa" placeholder="08xxxxxxxxxx">
</div>

<div class="form-group">
<label>Kontak Darurat</label>
<input type="text" id="kontakDarurat" placeholder="Nama kontak darurat">
</div>

<div class="form-group">
<label>Hubungan</label>
<input type="text" id="hubungan" placeholder="Contoh: Anak / Istri">
</div>

<div class="form-group">
<label>No Darurat</label>
<input type="text" id="noDarurat" placeholder="08xxxxxxxxxx">
</div>

<div class="form-group">
<label>Upload Paspor</label>
<input type="file" id="uploadPaspor" accept="image/*,.pdf">
<div class="file-info" id="pasporInfo"></div>
</div>

<div class="form-group">
<label>Upload KTP</label>
<input type="file" id="uploadKtp" accept="image/*,.pdf">
<div class="file-info" id="ktpInfo"></div>
</div>

</div>

<button type="submit" id="submitBtn">
Simpan Data
</button>

<div id="status"></div>

</form>

</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyu30HjHicOQbYNUbZ4Wb1aH6yeFIlbIgeQHlTlYT6sfQnFYyB01W-WSgGgddyGS5OE/exec";

function convertToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => resolve(reader.result);

        reader.onerror = error => reject(error);

    });

}

function showFileName(inputId,infoId){

    document
    .getElementById(inputId)
    .addEventListener("change",function(){

        const file = this.files[0];

        if(file){

            document
            .getElementById(infoId)
            .innerHTML = "📄 " + file.name;

        }

    });

}

showFileName("foto","fotoInfo");
showFileName("uploadPaspor","pasporInfo");
showFileName("uploadKtp","ktpInfo");

document
.getElementById("jamaahForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const button =
document.getElementById("submitBtn");

const status =
document.getElementById("status");

button.disabled = true;

button.innerHTML = "Mengupload...";

status.innerHTML = "";

try{

const fotoFile =
document.getElementById("foto").files[0];

const pasporFile =
document.getElementById("uploadPaspor").files[0];

const ktpFile =
document.getElementById("uploadKtp").files[0];

let fotoBase64 = "";
let pasporBase64 = "";
let ktpBase64 = "";

let fotoName = "";
let pasporName = "";
let ktpName = "";

if(fotoFile){

fotoBase64 =
await convertToBase64(fotoFile);

fotoName = fotoFile.name;

}

if(pasporFile){

pasporBase64 =
await convertToBase64(pasporFile);

pasporName = pasporFile.name;

}

if(ktpFile){

ktpBase64 =
await convertToBase64(ktpFile);

ktpName = ktpFile.name;

}

const data = {

nama:
document.getElementById("nama").value,

statusSiskopatuh:
document.getElementById("statusSiskopatuh").value,

idJamaah:
document.getElementById("idJamaah").value,

paspor:
document.getElementById("paspor").value,

masaPaspor:
document.getElementById("masaPaspor").value,

statusPaspor:
document.getElementById("statusPaspor").value,

nik:
document.getElementById("nik").value,

penyakit:
document.getElementById("penyakit").value,

wa:
document.getElementById("wa").value,

kontakDarurat:
document.getElementById("kontakDarurat").value,

hubungan:
document.getElementById("hubungan").value,

noDarurat:
document.getElementById("noDarurat").value,

fotoBase64:fotoBase64,
fotoName:fotoName,

pasporBase64:pasporBase64,
pasporName:pasporName,

ktpBase64:ktpBase64,
ktpName:ktpName

};

const response =
await fetch(scriptURL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify(data)

});

const result =
await response.json();

if(result.status === "success"){

status.innerHTML =
"✅ Data berhasil disimpan";

status.style.color = "green";

document
.getElementById("jamaahForm")
.reset();

document.getElementById("fotoInfo").innerHTML = "";
document.getElementById("pasporInfo").innerHTML = "";
document.getElementById("ktpInfo").innerHTML = "";

}else{

status.innerHTML =
"❌ " + result.message;

status.style.color = "red";

}

}catch(error){

status.innerHTML =
"❌ Upload gagal";

status.style.color = "red";

}

button.disabled = false;

button.innerHTML = "Simpan Data";

});

</script>

</body>
</html>
