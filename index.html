<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pendaftaran</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:100%;
      max-width:1000px;
      height:95vh;
      background:#fff;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .header{
      background:#0d6efd;
      color:white;
      text-align:center;
      padding:15px;
      font-size:22px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      Form Pendaftaran
    </div>

    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSf/viewform?embedded=true">
    </iframe>
  </div>

</body>
</html>
