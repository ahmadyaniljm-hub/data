<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Form Data Jamaah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:35px;
}

.header h1{
    font-size:32px;
    margin-bottom:10px;
}

.header p{
    opacity:0.9;
}

.form-area{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/-1;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

input,
select,
textarea{
    padding:14px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
    outline:none;
    transition:0.3s;
    font-family:'Poppins',sans-serif;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

textarea{
    resize:none;
    min-height:100px;
}

.file-info{
    font-size:12px;
    color:#64748b;
    margin-top:6px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:25px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:600;
}

@media(max-width:768px){

    .grid{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Form Data Jamaah</h1>
<p>Silakan isi data dengan lengkap dan benar</p>
</div>

<div class="form-area">

<form id="jamaahForm">

<div class="grid">

<div class="form-group">
<label>Upload Foto</label>
<input type="file" id="foto" accept="image/*">
<div class="file-info" id="fotoInfo"></div>
</div>

<div class="form-group">
<label>Nama Lengkap</label>
<input type="text" id="nama" required>
</div>

<div class="form-group">
<label>Status SISKOPATUH</label>
<select id="statusSiskopatuh">
<option>Aktif</option>
<option>Belum Aktif</option>
</select>
</div>

<div class="form-group">
<label>ID Jamaah</label>
<input type="text" id="idJamaah">
</div>

<div class="form-group">
<label>No Paspor</label>
<input type="text" id="paspor">
</div>

<div class="form-group">
<label>Masa Berlaku Paspor</label>
<input type="date" id="masaPaspor">
</div>

<div class="form-group">
<label>Status Paspor</label>
<select id="statusPaspor">
<option>Aktif</option>
<option>Kadaluarsa</option>
</select>
</div>

<div class="form-group">
<label>NIK</label>
<input type="text" id="nik">
</div>

<div class="form-group full">
<label>Riwayat Penyakit</label>
<textarea id="penyakit"></textarea>
</div>

<div class="form-group">
<label>No WhatsApp</label>
<input type="text" id="wa">
</div>

<div class="form-group">
<label>Kontak Darurat</label>
<input type="text" id="kontakDarurat">
</div>

<div class="form-group">
<label>Hubungan</label>
<input type="text" id="hubungan">
</div>

<div class="form-group">
<label>No Darurat</label>
<input type="text" id="noDarurat">
</div>

<div class="form-group">
<label>Upload Paspor</label>
<input type="file" id="uploadPaspor" accept="image/*,.pdf">
<div class="file-info" id="pasporInfo"></div>
</div>

<div class="form-group">
<label>Upload KTP</label>
<input type="file" id="uploadKtp" accept="image/*,.pdf">
<div class="file-info" id="ktpInfo"></div>
</div>

</div>

<button type="submit" id="submitBtn">
Simpan Data
</button>

<div id="status"></div>

</form>

</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyu30HjHicOQbYNUbZ4Wb1aH6yeFIlbIgeQHlTlYT6sfQnFYyB01W-WSgGgddyGS5OE/exec";

function convertToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => resolve(reader.result);

        reader.onerror = error => reject(error);

    });

}

function showFileName(inputId,infoId){

    document
    .getElementById(inputId)
    .addEventListener("change",function(){

        const file = this.files[0];

        if(file){

            document
            .getElementById(infoId)
            .innerHTML = file.name;

        }

    });

}

showFileName("foto","fotoInfo");
showFileName("uploadPaspor","pasporInfo");
showFileName("uploadKtp","ktpInfo");

document
.getElementById("jamaahForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const button =
document.getElementById("submitBtn");

const status =
document.getElementById("status");

button.disabled = true;

button.innerHTML = "Mengupload...";

status.innerHTML = "";

try{

const fotoFile =
document.getElementById("foto").files[0];

const pasporFile =
document.getElementById("uploadPaspor").files[0];

const ktpFile =
document.getElementById("uploadKtp").files[0];

let fotoBase64 = "";
let pasporBase64 = "";
let ktpBase64 = "";

let fotoName = "";
let pasporName = "";
let ktpName = "";

if(fotoFile){

fotoBase64 =
await convertToBase64(fotoFile);

fotoName = fotoFile.name;

}

if(pasporFile){

pasporBase64 =
await convertToBase64(pasporFile);

pasporName = pasporFile.name;

}

if(ktpFile){

ktpBase64 =
await convertToBase64(ktpFile);

ktpName = ktpFile.name;

}

const data = {

nama:
document.getElementById("nama").value,

statusSiskopatuh:
document.getElementById("statusSiskopatuh").value,

idJamaah:
document.getElementById("idJamaah").value,

paspor:
document.getElementById("paspor").value,

masaPaspor:
document.getElementById("masaPaspor").value,

statusPaspor:
document.getElementById("statusPaspor").value,

nik:
document.getElementById("nik").value,

penyakit:
document.getElementById("penyakit").value,

wa:
document.getElementById("wa").value,

kontakDarurat:
document.getElementById("kontakDarurat").value,

hubungan:
document.getElementById("hubungan").value,

noDarurat:
document.getElementById("noDarurat").value,

fotoBase64:fotoBase64,
fotoName:fotoName,

pasporBase64:pasporBase64,
pasporName:pasporName,

ktpBase64:ktpBase64,
ktpName:ktpName

};

const response =
await fetch(scriptURL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify(data)

});

const result =
await response.json();

if(result.status === "success"){

status.innerHTML =
"✅ Data berhasil disimpan";

status.style.color = "green";

document
.getElementById("jamaahForm")
.reset();

}else{

status.innerHTML =
"❌ " + result.message;

status.style.color = "red";

}

}catch(error){

status.innerHTML =
"❌ Upload gagal";

status.style.color = "red";

}

button.disabled = false;

button.innerHTML = "Simpan Data";

});

</script>

</body>
</html>
